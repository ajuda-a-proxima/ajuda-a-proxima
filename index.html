<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajuda o Próximo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-pix {
            background-color: #28a745;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-pix:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ajuda o Próximo</h1>
    <p>Sua doação faz a diferença!</p>
    
    <button class="btn-pix" onclick="fazerDoacao()">
        DOAR AGORA
    </button>
</div>

<audio id="audioAgradecimento">
    <source src="https://www.soundjay.com/buttons/sounds/button-4.mp3" type="audio/mpeg">
</audio>

<script>
    function fazerDoacao() {
        // Toca o áudio antes de redirecionar
        var audio = document.getElementById("audioAgradecimento");
        audio.play();

        // Aguarda um segundo para o áudio começar e redireciona para a sua vaquinha
        setTimeout(function() {
            window.location.href = "https://www.vakinha.com.br/5567311";
        }, 800);
    }
</script>

</body>
</html>
