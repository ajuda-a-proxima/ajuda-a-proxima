<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajuda o Próximo - AO VIVO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00ff41; /* Verde Matrix/Gamer */
            --accent-color: #00d2ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
        }

        /* Fundo Animado (Simulando Vídeo/3D) */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #0a0a0a, #1a1a1a);
            z-index: -1;
        }

        .video-bg::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.3;
        }

        /* Efeito de Luz 3D rodando ao fundo */
        .light-effect {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(0,255,65,0.05) 0%, transparent 70%);
            top: -25%;
            left: -25%;
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            z-index: 10;
            position: relative;
        }

        .card {
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 350px;
        }

        .live-tag {
            background: #ff0000;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 15px;
            display: inline-block;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }

        .btn-main {
            background: var(--primary-color);
            color: #000;
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 800;
            display: block;
            margin: 10px 0;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .btn-pix {
            background: #fff;
            color: #000;
            font-size: 14px;
        }

        /* Notificações Aceleradas */
        #notif-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 280px;
            z-index: 100;
        }

        .notif-box {
            background: white;
            color: #333;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            animation: slideLeft 0.4s ease-out forwards;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .notif-box img { width: 45px; height: 45px; border-radius: 50%; margin-right: 10px; border: 2px solid #28a745; }
        .notif-content b { color: #000; font-size: 14px; }
        .notif-content p { margin: 0; font-size: 12px; color: #555; font-style: italic; }

        @keyframes slideLeft { from { transform: translateX(120%); } to { transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: scale(0.9); } }

        .online-now { color: #aaa; font-size: 13px; margin-bottom: 20px; }
        .online-now span { color: var(--primary-color); font-weight: bold; }
    </style>
</head>
<body>

    <div class="video-bg">
        <div class="light-effect"></div>
    </div>

    <div id="notif-container"></div>

    <div class="container">
        <div class="card">
            <div class="live-tag"><i class="fas fa-video"></i> AO VIVO</div>
            <h1 style="margin:0;">Ajuda o Próximo</h1>
            <div class="online-now"><i class="fas fa-eye"></i> <span id="viewers">1,240</span> assistindo agora</div>
            
            <p style="font-size: 14px; color: #888;">Seja parte dessa mudança. Escolha como ajudar:</p>

            <button class="btn-main" onclick="irVakinha()">DOAR PELA VAQUINHA</button>
            <button class="btn-main btn-pix" onclick="copiarPix()">COPIAR CHAVE PIX (CNPJ)</button>
            
            <p id="msg-copiado" style="font-size: 12px; color: var(--primary-color); display:none; margin-top:5px;">Chave copiada!</p>
        </div>
    </div>

    <script>
        const nomes = ["Marcos Rodrigues", "Dra. Elen", "Felipe Silva", "Sobrancelhas Design", "Auto Peças Lapa", "Ronaldo Fenomeno", "Gessica", "Manoel", "Bia", "Sueli", "Pastor Arnaldo", "Rian Silva", "Carlos Delivery"];
        const frases = ["Acabei de doar! Boa sorte!", "Deus abençoe esse projeto.", "Obrigado por ajudar o próximo!", "Fiz minha parte, façam a sua!", "Mais uma doação enviada!", "Tamo junto!", "Projeto nota 10!", "Fiz o Pix agora mesmo."];
        const valores = ["10,00", "50,00", "20,00", "5,00", "100,00", "35,00", "15,00"];

        function irVakinha() { window.location.href = "https://www.vakinha.com.br/6074047"; }

        function copiarPix() {
            navigator.clipboard.writeText("6074047@vakinha.com.br");
            document.getElementById('msg-copiado').style.display = 'block';
            setTimeout(() => { document.getElementById('msg-copiado').style.display = 'none'; }, 2000);
        }

        function createNotif() {
            const container = document.getElementById('notif-container');
            const nome = nomes[Math.floor(Math.random() * nomes.length)];
            const frase = frases[Math.floor(Math.random() * frases.length)];
            const valor = valores[Math.floor(Math.random() * valores.length)];
            const imgId = Math.floor(Math.random() * 70);

            const div = document.createElement('div');
            div.className = 'notif-box';
            div.innerHTML = `
                <img src="https://i.pravatar.cc/150?u=${imgId}">
                <div class="notif-content">
                    <b>${nome} doou R$ ${valor}</b>
                    <p>"${frase}"</p>
                </div>
            `;
            container.appendChild(div);

            setTimeout(() => {
                div.style.animation = "fadeOut 0.5s forwards";
                setTimeout(() => div.remove(), 500);
            }, 3500);
        }

        // Frequência rápida de notificações
        setInterval(createNotif, 2500);

        // Contador de pessoas online variando
        setInterval(() => {
            const v = document.getElementById('viewers');
            let n = parseInt(v.innerText.replace(',', ''));
            v.innerText = (n + Math.floor(Math.random() * 10 - 4)).toLocaleString();
        }, 2000);

    </script>
</body>
</html>
