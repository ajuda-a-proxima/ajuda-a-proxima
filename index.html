<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajuda a Próxima - Doação Pix</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #333; }
        p { color: #666; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: #32bcad;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        button:hover { background-color: #28a396; }
        .footer { margin-top: 1.5rem; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ajuda a Próxima</h1>
        <p>Contribua com nosso projeto social via Pix. Sua ajuda faz a diferença!</p>
        
        <input type="text" id="nome" placeholder="Seu Nome (Opcional)">
        <input type="number" id="valor" placeholder="Valor da Doação (R$)">
        
        <button onclick="gerarPix()">Gerar Pagamento Pix</button>

        <div id="resultado" style="margin-top: 20px;"></div>

        <div class="footer">
            © 2026 Ajuda a Próxima - Todos os direitos reservados.
        </div>
    </div>

    <script>
        async function gerarPix() {
            const nome = document.getElementById('nome').value;
            const valor = document.getElementById('valor').value;
            const resultadoDiv = document.getElementById('resultado');

            if (!valor || valor <= 0) {
                alert("Por favor, insira um valor válido.");
                return;
            }

            resultadoDiv.innerHTML = "Processando...";

            try {
                // Aqui o site se conecta com o seu backend no Render
                const response = await fetch('/gerar-pix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, valor })
                });

                const data = await response.json();
                if (data.qrCode) {
                    resultadoDiv.innerHTML = `<p>Escaneie o código abaixo:</p><img src="${data.qrCode}" width="200">`;
                } else {
                    resultadoDiv.innerHTML = "Erro ao gerar Pix. Tente novamente.";
                }
            } catch (error) {
                resultadoDiv.innerHTML = "Erro de conexão com o servidor.";
                console.error(error);
            }
        }
    </script>
</body>
</html>
